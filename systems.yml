# Hive Metastore Deployment
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metastore
  namespace: hive
spec:
  selector:
    matchLabels:
      app: metastore
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: metastore
    spec:
      containers:
      - name: metastore
        image: alexcpn/hivemetastore:3.1.3.5
        env:
        - name: AWS_ACCESS_KEY_ID
          value: "minioadmin"
        - name: AWS_SECRET_ACCESS_KEY
          value: "minioadmin"
        ports:
        - containerPort: 9083
        volumeMounts:
        - name: metastore-cfg-vol
          mountPath: /opt/apache-hive-metastore-3.1.3-bin/conf/metastore-site.xml
          subPath: metastore-site.xml
        - name: metastore-cfg-vol
          mountPath: /opt/hadoop-3.3.0/etc/hadoop/core-site.xml
          subPath: core-site.xml
        command:
        - /opt/apache-hive-metastore-3.1.3-bin/bin/start-metastore
        args:
        - "-p"
        - "9083"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
      volumes:
      - name: metastore-cfg-vol
        configMap:
          name: metastore-cfg
