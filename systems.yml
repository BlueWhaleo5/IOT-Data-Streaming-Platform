# Storage Class cho Minikube
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: standard
provisioner: k8s.io/minikube-hostpath
reclaimPolicy: Delete
volumeBindingMode: Immediate

# Kafka PVCs
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kafka-pvc-0
  namespace: kafka-kraft
spec:
  storageClassName: standard
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kafka-pvc-1
  namespace: kafka-kraft
spec:
  storageClassName: standard
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kafka-pvc-2
  namespace: kafka-kraft
spec:
  storageClassName: standard
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

# Kafka Services
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-svc
  namespace: kafka-kraft
spec:
  clusterIP: None
  ports:
    - name: client
      port: 9092
      targetPort: 9092
  selector:
    app: kafka-app
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-nodeport
  namespace: kafka-kraft
spec:
  type: NodePort
  ports:
    - port: 9092
      targetPort: 9092
      nodePort: 31092
  selector:
    app: kafka-app

# Kafka StatefulSet (KRaft)
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: kafka-kraft
spec:
  serviceName: kafka-svc
  replicas: 2
  selector:
    matchLabels:
      app: kafka-app
  template:
    metadata:
      labels:
        app: kafka-app
    spec:
      containers:
      - name: kafka
        image: wurstmeister/kafka:2.13-2.8.1
        command:
        - /bin/bash
        - -c
        - |
          echo "Starting Kafka in KRaft mode..."
          sleep 10
          if [ ! -f /kafka/meta.properties ]; then
            echo "First run - formatting storage..."
            /opt/kafka/bin/kafka-storage.sh random-uuid > /tmp/cluster_id
            CLUSTER_ID=$(cat /tmp/cluster_id)
            echo "CLUSTER_ID=$CLUSTER_ID"
            cp /tmp/cluster_id /kafka/cluster_id
            /opt/kafka/bin/kafka-storage.sh format -t $CLUSTER_ID -c /opt/kafka/config/kraft/server.properties
          fi
          echo "Starting Kafka server..."
          exec /opt/kafka/bin/kafka-server-start.sh /opt/kafka/config/kraft/server.properties
        ports:
        - containerPort: 9092
        env:
        - name: KAFKA_HEAP_OPTS
          value: "-Xmx512m -Xms256m"
        resources:
          requests:
            memory: "512Mi"
            cpu: "300m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        volumeMounts:
        - name: kafka-storage
          mountPath: /kafka
      volumes:
      - name: kafka-storage
        persistentVolumeClaim:
          claimName: kafka-pvc-0

# MinIO PVC
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
  namespace: minio
spec:
  storageClassName: standard
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

# MinIO Secrets
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-admin
  namespace: trino
data:
  username: bWluaW9hZG1pbg==  # minioadmin
  password: bWluaW9hZG1pbg==  # minioadmin
# MinIO Deployment
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
      - name: minio
        image: minio/minio:latest
        args:
        - server
        - /data
        - "--console-address"
        - ":9001"
        env:
        - name: MINIO_ROOT_USER
          value: "minioadmin"
        - name: MINIO_ROOT_PASSWORD
          value: "minioadmin"
        ports:
        - containerPort: 9000
        - containerPort: 9001
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: minio-pvc

# MinIO Service
---
apiVersion: v1
kind: Service
metadata:
  name: minio-service
  namespace: minio
spec:
  type: NodePort
  ports:
