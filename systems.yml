      port: 9000
      targetPort: 9000
      nodePort: 31000
    - name: console
      port: 9001
      targetPort: 9001
      nodePort: 31001
  selector:
    app: minio

# PostgreSQL Secrets
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-admin
  namespace: postgres
data:
  db: cG9zdGdyZXM= #postgres
  password: cG9zdGdyZXNzcGFzc3dvcmQxMjM= #postgresspassword123
  user: cG9zdGdyZXM= #postgres

# PostgreSQL PVC
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: postgres
spec:
  storageClassName: standard
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

# PostgreSQL Deployment
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:13
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: postgres-admin
              key: db
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-admin
              key: user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-admin
              key: password
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: postgres-pvc

# PostgreSQL Service
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: postgres
spec:
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: postgres

# Hive Metastore ConfigMap
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: metastore-cfg
  namespace: hive
data:
  core-site.xml: |
    <configuration>
        <property>
            <name>fs.s3a.connection.ssl.enabled</name>
            <value>false</value>
        </property>
        <property>
            <name>fs.s3a.endpoint</name>
            <value>http://minio-service.minio:9000</value>
        </property>
        <property>
            <name>fs.s3a.fast.upload</name>
            <value>true</value>
        </property>
        <property>
            <name>fs.s3a.access.key</name>
            <value>minioadmin</value>
        </property>
        <property>
            <name>fs.s3a.secret.key</name>
            <value>minioadmin</value>
        </property>
        <property>
            <name>fs.s3a.path.style.access</name>
            <value>true</value>
        </property>
    </configuration>
  metastore-site.xml: |
    <configuration>
        <property>
            <name>metastore.task.threads.always</name>
            <value>org.apache.hadoop.hive.metastore.events.EventCleanerTask</value>
        </property>
        <property>
            <name>metastore.expression.proxy</name>
            <value>org.apache.hadoop.hive.metastore.DefaultPartitionExpressionProxy</value>
        </property>
        <property>
            <name>javax.jdo.option.ConnectionURL</name>
            <value>jdbc:postgresql://postgres.postgres:5432/postgres?allowPublicKeyRetrieval=true&amp;useSSL=false&amp;serverTimezone=UTC</value>
        </property>
        <property>
            <name>javax.jdo.option.ConnectionDriverName</name>
            <value>org.postgresql.Driver</value>
        </property>
        <property>
            <name>javax.jdo.option.ConnectionUserName</name>
            <value>postgres</value>
        </property>
        <property>
            <name>javax.jdo.option.ConnectionPassword</name>
            <value>postgresspassword123</value>
        </property>
        <property>
            <name>metastore.warehouse.dir</name>
            <value>s3a://bronze/warehouse</value>
        </property>
        <property>
            <name>metastore.thrift.port</name>
            <value>9083</value>
        </property>
    </configuration>

# Hive Secrets
---
apiVersion: batch/v1
kind: Job
metadata:
  name: hive-initschema
  namespace: hive
spec:
  template:
    spec:
      containers:
      - name: hivemeta
        image: alexcpn/hivemetastore:3.1.3.5
        command:
        - /bin/bash
        - -c
        - |
          echo "🗃️ Initializing Hive schema..."
          # Copy config files to correct locations
          cp /opt/apache-hive-metastore-3.1.3-bin/conf/metastore-site.xml /tmp/
          cp /opt/hadoop-3.3.0/etc/hadoop/core-site.xml /tmp/
          
          # Initialize schema với explicit config
          /opt/apache-hive-metastore-3.1.3-bin/bin/schematool \
            -dbType postgres \
            -initSchema \
            -verbose
          echo "✅ Schema initialization completed!"
        env:
        - name: AWS_ACCESS_KEY_ID
          value: "minioadmin"
        - name: AWS_SECRET_ACCESS_KEY
          value: "minioadmin"
        volumeMounts:
        - name: metastore-cfg-vol
          mountPath: /opt/apache-hive-metastore-3.1.3-bin/conf/metastore-site.xml
          subPath: metastore-site.xml
        - name: metastore-cfg-vol
          mountPath: /opt/hadoop-3.3.0/etc/hadoop/core-site.xml
          subPath: core-site.xml
      restartPolicy: OnFailure
      volumes:
      - name: metastore-cfg-vol
        configMap:
          name: metastore-cfg
  backoffLimit: 3
---
apiVersion: v1
