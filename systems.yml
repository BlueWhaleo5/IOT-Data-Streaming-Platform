# Spark ConfigMap
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: spark-code
  namespace: spark
data:
  Spark_Processing.py: |
    # [Nội dung Spark_Processing.py của bạn]

# Spark Driver Deployment
---
# Sửa Spark Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-driver
  namespace: spark
spec:
  selector:
    matchLabels:
      app: spark-driver
  template:
    metadata:
      labels:
        app: spark-driver
    spec:
      containers:
      - name: spark
        image: apache/spark:3.5.0
        command:
        - /bin/bash
        - -c
        - |
          # Wait for MinIO to be ready
          until nc -z minio-service.minio 9000; do
            echo "Waiting for MinIO..."
            sleep 5
          done
          echo "Starting Spark job..."
          /opt/bitnami/spark/bin/spark-submit \
            --packages "org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,io.delta:delta-core_2.12:2.4.0,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262" \
            --conf "spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension" \
            --conf "spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog" \
            --conf "spark.hadoop.fs.s3a.endpoint=http://minio-service.minio:9000" \
            --conf "spark.hadoop.fs.s3a.access.key=minioadmin" \
            --conf "spark.hadoop.fs.s3a.secret.key=minioadmin" \
            --conf "spark.hadoop.fs.s3a.path.style.access=true" \
            --conf "spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem" \
            --conf "spark.hadoop.fs.s3a.connection.ssl.enabled=false" \
            --driver-memory 1g \
            /opt/spark/conf/Spark_Processing.py
        env:
        - name: AWS_ACCESS_KEY_ID
          value: "minioadmin"
        - name: AWS_SECRET_ACCESS_KEY
          value: "minioadmin"
        volumeMounts:
        - name: spark-code
          mountPath: /opt/spark/conf
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
      volumes:
      - name: spark-code
        configMap:
          name: spark-code
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-streaming
  namespace: spark
spec:
  selector:
    matchLabels:
      app: spark-streaming
  template:
    metadata:
      labels:
        app: spark-streaming
    spec:
      containers:
      - name: spark-streaming
        image: apache/spark:3.5.0
        command:
        - /bin/bash
        - -c
        - |
          # Wait for services
          until nc -z minio-service.minio 9000; do echo "Waiting for MinIO..."; sleep 5; done
          until nc -z kafka-svc.kafka-kraft 9092; do echo "Waiting for Kafka..."; sleep 5; done
          
          echo "Starting Spark Streaming job..."
          /opt/bitnami/spark/bin/spark-submit \
            --packages "org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,io.delta:delta-core_2.12:2.4.0,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262" \
            --conf "spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension" \
            --conf "spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog" \
            --conf "spark.hadoop.fs.s3a.endpoint=http://minio-service.minio:9000" \
            --conf "spark.hadoop.fs.s3a.access.key=minioadmin" \
            --conf "spark.hadoop.fs.s3a.secret.key=minioadmin" \
            --conf "spark.hadoop.fs.s3a.path.style.access=true" \
            --conf "spark.sql.streaming.checkpointLocation=s3a://silver/checkpoints/" \
            --driver-memory 2g \
            --executor-memory 2g \
            /opt/spark/conf/Spark_Streaming.py
        env:
        - name: AWS_ACCESS_KEY_ID
          value: "minioadmin"
        - name: AWS_SECRET_ACCESS_KEY
          value: "minioadmin"
        volumeMounts:
        - name: spark-streaming-code
          mountPath: /opt/spark/conf
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
      volumes:
      - name: spark-streaming-code
        configMap:
          name: spark-streaming-code
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: spark-streaming-code
  namespace: spark
data:
  Spark_Streaming.py: |
    # [Nội dung Spark_Streaming.py ở trên]
---
apiVersion: v1
kind: Namespace
metadata:
  name: grafana
---
# SỬA PHẦN NÀY - Grafana Deployment Final Fix
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:9.5.0
        ports:
        - containerPort: 3000
        env:
        # XÓA DÒNG NÀY: - name: GF_INSTALL_PLUGINS
        - name: GF_SECURITY_ADMIN_USER
          value: "admin"
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "admin123"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: grafana-storage
          mountPath: /var/lib/grafana
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: grafana-storage
        emptyDir: {}
# Thêm Grafana PVC
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: grafana
spec:
  storageClassName: standard
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

# Thêm Grafana ConfigMap cho grafana.ini
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: grafana
data:
  grafana.ini: |
    [database]
    type = sqlite3
    
    [security]
    admin_user = admin
    admin_password = admin123
    
    [server]
    protocol = http
    http_port = 3000
    domain = localhost
    
    [log]
    mode = console
    level = info
    
    [paths]
    data = /var/lib/grafana
    logs = /var/log/grafana
    plugins = /var/lib/grafana/plugins
    provisioning = /etc/grafana/provisioning

# Sửa Grafana Datasources Config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
    - name: Trino
      type: grafana-trino-datasource
      access: proxy
      url: http://trino-service.trino:8080
      isDefault: true
      jsonData:
        username: trino
        catalog: hive
        schema: iot_dashboard_fixed

# Thêm Dashboard Provisioning
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: grafana
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
    - name: 'default'
      orgId: 1
      folder: ''
      type: file
      disableDeletion: false
      updateIntervalSeconds: 10
      allowUiUpdates: true
      options:
        path: /etc/grafana/provisioning/dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: grafana
spec:
  type: NodePort
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 31090
  selector:
    app: grafana