# Trino Coordinator Deployment
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trino-coordinator
  namespace: trino
spec:
  selector:
    matchLabels:
      app: trino-coordinator
  template:
    metadata:
      labels:
        app: trino-coordinator
    spec:
      containers:
      - name: trino
        image: trinodb/trino:386
        command:
        - /bin/bash
        - -c
        - |
          # Create config directories
          mkdir -p /usr/lib/trino/etc/catalog
          
          # Write ALL required config files
          cat > /usr/lib/trino/etc/jvm.config << 'EOL'
          -server
          -Xmx1G
          -XX:-UseBiasedLocking
          -XX:+UseG1GC
          -XX:G1HeapRegionSize=32M
          -XX:+ExplicitGCInvokesConcurrent
          -XX:+ExitOnOutOfMemoryError
          -XX:+UseGCOverheadLimit
          -Djdk.attach.allowAttachSelf=true
          EOL
          
          cat > /usr/lib/trino/etc/config.properties << 'EOL'
          coordinator=true
          node-scheduler.include-coordinator=true
          http-server.http.port=8080
          query.max-memory=1GB
          query.max-memory-per-node=512MB
          discovery-server.enabled=true
          discovery.uri=http://localhost:8080
          EOL
          
          cat > /usr/lib/trino/etc/node.properties << 'EOL'
          node.environment=production
          node.data-dir=/tmp/trino-data
          EOL
          
          cat > /usr/lib/trino/etc/catalog/hive.properties << 'EOL'
          connector.name=hive
          hive.metastore.uri=thrift://metastore.hive:9083
          hive.s3.endpoint=http://minio-service.minio:9000
          hive.s3.aws-access-key=minioadmin
          hive.s3.aws-secret-key=minioadmin
          hive.s3.path-style-access=true
          hive.s3.ssl.enabled=false
          hive.non-managed-table-writes-enabled=true
          EOL
          
          echo "Starting Trino..."
          /usr/lib/trino/bin/launcher run
        ports:
        - containerPort: 8080
        env:
        - name: AWS_ACCESS_KEY_ID
          value: "minioadmin"
        - name: AWS_SECRET_ACCESS_KEY
          value: "minioadmin"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
---
